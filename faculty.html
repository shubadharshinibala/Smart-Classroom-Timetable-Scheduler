<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Faculty Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
}

.container-box{
    margin-top:40px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.table{
    margin-top:20px;
}

.page-title{
    color:#0d6efd;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container container-box">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title">
            Faculty Management
        </h2>

        <button class="btn btn-primary">
            <i class="fas fa-plus"></i>
            Add Faculty
        </button>

    </div>

    <div class="card p-4">

        <div class="row mb-3">

            <div class="col-md-6">

                <input
                type="text"
                class="form-control"
                placeholder="Search Faculty">

            </div>

        </div>

        <table class="table table-hover">

            <thead class="table-primary">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Email</th>
                    <th>Workload</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>F001</td>
                    <td>John Smith</td>
                    <td>Computer Science</td>
                    <td>john@college.edu</td>
                    <td>18 Hours</td>

                    <td>
                        <button class="btn btn-warning btn-sm">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>F002</td>
                    <td>Priya Kumar</td>
                    <td>Information Technology</td>
                    <td>priya@college.edu</td>
                    <td>20 Hours</td>

                    <td>
                        <button class="btn btn-warning btn-sm">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>F003</td>
                    <td>Arun Raj</td>
                    <td>Electronics</td>
                    <td>arun@college.edu</td>
                    <td>16 Hours</td>

                    <td>
                        <button class="btn btn-warning btn-sm">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
