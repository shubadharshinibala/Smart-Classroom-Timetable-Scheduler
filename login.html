<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Smart Classroom & Timetable Scheduler</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>
body{
    background: linear-gradient(135deg,#0d6efd,#6ea8fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:450px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h2{
    color:#0d6efd;
    font-weight:700;
}

.form-control{
    height:50px;
}

.btn-login{
    height:50px;
    font-size:18px;
}

.footer-text{
    text-align:center;
    margin-top:20px;
    color:#6c757d;
}
</style>

</head>
<body>

<div class="login-card">

    <div class="logo">
        <h2>Smart Classroom</h2>
        <p>Timetable Scheduler System</p>
    </div>

    <form action="dashboard.html">

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email"
                   class="form-control"
                   placeholder="Enter Email">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control"
                   placeholder="Enter Password">
        </div>

        <div class="d-flex justify-content-between mb-3">

            <div>
                <input type="checkbox">
                Remember Me
            </div>

            <a href="#">Forgot Password?</a>

        </div>

        <button type="submit"
                class="btn btn-primary w-100 btn-login">
            Login
        </button>

    </form>

    <div class="footer-text">
        <p>
            Smart Classroom & Timetable Scheduler
        </p>
    </div>

</div>

</body>
</html>
